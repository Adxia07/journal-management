apiVersion: 1

# Provisioners для Grafana
providers:
  # Dashboards
  - name: 'dashboards'
    orgId: 1
    folder: 'Journal API'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards

  # Datasources
  - name: 'datasources'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/datasources
