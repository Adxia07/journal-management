# nginx.conf — конфигурация обратного прокси для системы управления редакцией
# Nginx принимает все входящие запросы на порт 80 и перенаправляет их на API

events {
    # Максимальное количество одновременных соединений на один процесс
    worker_connections 1024;
}

http {
    # Определяем группу серверов (upstream) — наше ASP.NET Core приложение.
    # "api" — это имя сервиса в docker-compose.yml, Docker DNS резолвит его автоматически.
    # 8080 — порт, который слушает ASP.NET Core внутри контейнера.
    upstream journal_api {
        server api:8080;
    }

    # Логи
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Настройки для передачи больших тел запросов (например, текст статьи)
    client_max_body_size 10M;

    # Таймауты
    proxy_read_timeout 90s;
    proxy_connect_timeout 10s;

    server {
        # Nginx слушает на порту 80
        listen 80;
        server_name localhost;

        # =====================================================
        # Главный блок: проксируем все запросы /api/** на API
        # =====================================================
        location /api/ {
            proxy_pass http://journal_api;

            # Передаём заголовки, чтобы API знал реальный IP клиента
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # =====================================================
        # Swagger UI — документация API
        # =====================================================
        location /swagger {
            proxy_pass http://journal_api;
            proxy_set_header Host $host;
        }

        # =====================================================
        # Health check
        # =====================================================
        location /health {
            proxy_pass http://journal_api;
            proxy_set_header Host $host;
        }

        # =====================================================
        # ВАЖНО: /metrics НЕ проксируем наружу!
        # Prometheus сам опрашивает API напрямую внутри Docker-сети.
        # Эта локация защищает метрики от внешнего доступа.
        # =====================================================
        location /metrics {
            return 403 "Access denied";
        }

        # =====================================================
        # Корневой путь — редирект на Swagger
        # =====================================================
        location = / {
            return 301 /swagger;
        }

        # =====================================================
        # Страница ошибок
        # =====================================================
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 503 '{"error": "Service temporarily unavailable", "code": 503}';
            add_header Content-Type application/json;
        }
    }
}
