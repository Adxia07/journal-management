version: '3.8'

networks:
  journal-network:
    driver: bridge

volumes:
  postgres-data:
  grafana-data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: journal-postgres
    environment:
      POSTGRES_DB: journal_db
      POSTGRES_USER: journal_user
      POSTGRES_PASSWORD: journal_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - journal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U journal_user -d journal_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: journal-redis
    ports:
      - "6379:6379"
    networks:
      - journal-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: ./JournalApi
      dockerfile: Dockerfile
    container_name: journal-api
    environment:
      CONNECTION_STRING: "Host=postgres;Port=5432;Database=journal_db;Username=journal_user;Password=journal_pass"
      REDIS_CONNECTION: "redis:6379"
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - journal-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: journal-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - journal-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: journal-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - api
    networks:
      - journal-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: journal-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - journal-network
    restart: unless-stopped

  web:
    build:
      context: ./JournalManagement.Web
      dockerfile: Dockerfile
    container_name: journal-web
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    depends_on:
      - api
    networks:
      - journal-network
    restart: unless-stopped

  web-author:
    build:
      context: ./JournalManagement.Web
      dockerfile: Dockerfile
    container_name: journal-web-author
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    depends_on:
      - api
    networks:
      - journal-network
    restart: unless-stopped